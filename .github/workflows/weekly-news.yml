name: Weekly News Synthesis

on:
  # Sunday at 8:00 AM Central (13:00 UTC during CDT)
  schedule:
    - cron: "0 13 * * 0"
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  # ============================================================
  # Claude Haiku 4.5 — Weekly Synthesis
  # ============================================================
  weekly-claude:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download seen articles from the most recent previous run.
      # Uses GitHub REST API via gh CLI to search across all runs.
      - name: Download seen articles from previous run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          ARTIFACT_ID=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?name=seen-articles-claude&per_page=1" \
            --jq '.artifacts[0].id // empty' 2>/dev/null || true)
          if [ -n "$ARTIFACT_ID" ]; then
            echo "Found artifact ID: $ARTIFACT_ID — downloading..."
            gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > artifact.zip
            unzip -o artifact.zip -d data/ || echo "Warning: unzip failed, starting fresh"
            rm -f artifact.zip
            echo "Seen articles file contents:"
            cat data/seen_articles.json 2>/dev/null || echo "(file not found after unzip)"
          else
            echo "No previous seen-articles-claude artifact found — starting fresh"
          fi
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and send weekly synthesis (Claude)
        env:
          LLM_PROVIDER: claude
          LLM_MODEL: claude-haiku-4-5-20251001
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFICATION_METHODS: email
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SUBJECT: "The Hour Hand"
          CONFIG_PATH: config-weekly.yaml
          SEEN_ARTICLES_PATH: data/seen_articles.json
        run: python main.py

      # Upload updated seen articles for next run
      - name: Upload seen articles
        uses: actions/upload-artifact@v4
        with:
          name: seen-articles-claude
          path: data/seen_articles.json
          retention-days: 10
          overwrite: true
        if: always()

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-claude-error-logs
          path: "*.log"
          retention-days: 7

