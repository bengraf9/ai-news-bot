# Personal News Digest — Daily Configuration
# Selects 3 personally relevant stories each morning

llm:
  provider: claude

news:
  enable_web_search: false
  max_items_per_source: 10

  # Stage 1: Select exactly 3 personally relevant stories
  stage1_prompt_template: |
      {formatted_news}

      ## YOUR TASK — SELECT EXACTLY 3 STORIES

      You are my personal news curator. From the {total_items} news items above,
      select exactly 3 that are most relevant to MY specific interests.

      MY INTEREST PROFILE (in rough priority order):

      1. TEXAS LONGHORNS: Any Longhorn news is high priority. Football focus,
         but notable news from other sports welcome. Include recruiting, coaching
         changes, game results, transfers, schedule/rankings.
         From Burnt Orange Nation: strongly prefer concrete news (game results,
         scores, signings, roster moves, coaching changes, recruiting commitments).
         Skip analysis, opinion, gamethreads, previews, and roundup posts unless
         they contain a genuinely significant development.

      2. APPLE ECOSYSTEM & AI: Major Apple product launches, software updates,
         ecosystem changes. Significant AI developments — capability jumps, major
         model releases, industry shifts, open source milestones.
         (Skip: minor app updates, funding rounds, AI hype without substance)

      3. SCIENCE & SPACE: Breakthroughs, discoveries, mission milestones.
         (Skip: routine ISS ops, incremental studies, health/diet news)

      4. SAN ANTONIO SPURS: Game results, trades, draft news, major injuries,
         coaching changes.

      5. US SOCCER (USMNT & USWNT): Match results, World Cup updates, roster news.

      6. COLLEGE FOOTBALL (general): Playoff/rankings, conference realignment,
         rule changes, coaching carousel, transfer portal shakeups.

      7. BOARD GAMES: Notable new releases, major awards (Spiel des Jahres,
         Kennerspiel, Deutscher Spiele Preis, Golden Geek), convention news
         (Gen Con, Essen Spiel, SHUX). Particular interest in eurogames /
         strategy games, but not exclusively.

      8. RICE OWLS: Only if genuinely big — coaching change, stunning upset.

      9. BIG SPORTS STORIES: Record-breaking, historic, or culturally significant.

      EXCLUDE: Celebrity news, crime, political horse-race coverage, daily
      political bickering, opinion masquerading as news, outrage bait.

      RULES:
      - Exactly 3 stories. No more, no less.
      - All 3 can come from the same category if warranted.
      - Prefer surprising stories I wouldn't encounter casually.

      Return ONLY a JSON array of selected news IDs:
      ["INT-1", "INT-5", "INT-12"]

  # Stage 2: Summarize the 3 selected stories concisely
  stage2_prompt_template: |
      Create a concise news digest for these {count} pre-selected stories.

      {selected_news}

      For each story, provide:
      1. **Bold headline** (your own wording, not the article's)
      2. **2-3 sentence summary**: what happened, why it matters, key context
      3. **Source**: [Source Name](URL)

      Style: conversational but informative, like a knowledgeable friend.
      Include specific numbers/scores/data when available.
      Total email under 300 words. No preamble, no sign-off, no category headers.

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
